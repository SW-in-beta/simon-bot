<!DOCTYPE html>
<html lang="ko" data-theme="auto">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{REPORT_TITLE}} — Report Viewer</title>

<!-- Fonts -->
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Vendor: marked.js -->
<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
<!-- Vendor: highlight.js -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github.min.css" media="(prefers-color-scheme: light)" id="hljs-light">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css" media="(prefers-color-scheme: dark)" id="hljs-dark">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
<!-- Vendor: mermaid.js -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<!-- Vendor: KaTeX -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js"></script>
<!-- Vendor: Vditor (WYSIWYG markdown editor) -->
<link rel="stylesheet" href="https://unpkg.com/vditor@3/dist/index.css">
<script src="https://unpkg.com/vditor@3/dist/index.min.js"></script>

<link rel="stylesheet" href="/assets/style.css">
</head>
<body>

<!-- Header -->
<header class="rv-header">
  <div class="rv-header__left">
    <span class="rv-header__label">REPORT</span>
    <h1 class="rv-header__title" id="reportTitle">{{REPORT_TITLE}}</h1>
  </div>
  <div class="rv-header__right">
    <time class="rv-header__date" id="reportDate"></time>
    <button class="rv-btn rv-btn--secondary rv-edit-toggle" id="editToggleBtn" title="편집 모드">
      <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/></svg>
      편집
    </button>
    <button class="rv-btn rv-btn--icon" id="themeToggle" title="테마 전환" aria-label="테마 전환">
      <svg class="rv-icon rv-icon--sun" viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/></svg>
      <svg class="rv-icon rv-icon--moon" viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
    </button>
  </div>
</header>

<!-- Layout -->
<div class="rv-layout">
  <!-- Sidebar: TOC -->
  <aside class="rv-sidebar" id="sidebar">
    <nav class="rv-toc" id="toc">
      <div class="rv-toc__header">
        <span class="rv-toc__label">목차</span>
        <span class="rv-toc__badge" id="commentCountBadge" hidden>0</span>
      </div>
      <ul class="rv-toc__list" id="tocList"></ul>
    </nav>
    <div class="rv-sidebar__review" id="reviewProgress">
      <div class="rv-toc__label">리뷰 현황</div>
      <div class="rv-review-stats" id="reviewStats"></div>
    </div>
  </aside>

  <!-- Main content -->
  <main class="rv-content" id="content">
    <article class="rv-article" id="article"></article>
    <div class="rv-editor-container" id="editorContainer" hidden>
      <div class="rv-editor-toolbar" id="editToolbar">
        <span class="rv-editor-toolbar__label">편집 중</span>
        <div class="rv-editor-toolbar__actions">
          <button class="rv-btn rv-btn--secondary" id="editCancelBtn">취소</button>
          <button class="rv-btn rv-btn--primary" id="editSaveBtn">
            <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg>
            저장
          </button>
        </div>
      </div>
      <div id="vditorEditor"></div>
    </div>
  </main>

  <!-- Comment margin -->
  <aside class="rv-comments-margin" id="commentsMargin"></aside>
</div>

<!-- Bottom toolbar -->
<footer class="rv-toolbar" id="toolbar">
  <div class="rv-toolbar__left">
    <button class="rv-btn rv-btn--secondary" id="copyPathBtn" title="마크다운 경로 복사">
      <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path d="M8 2a1 1 0 000 2h2a1 1 0 100-2H8z"/><path d="M3 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v6h-4.586l1.293-1.293a1 1 0 00-1.414-1.414l-3 3a1 1 0 000 1.414l3 3a1 1 0 001.414-1.414L10.414 13H15v3a2 2 0 01-2 2H5a2 2 0 01-2-2V5z"/></svg>
      경로 복사
    </button>
    <button class="rv-btn rv-btn--secondary" id="exportCommentsBtn" title="코멘트 내보내기">
      <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
      코멘트 내보내기
    </button>
  </div>
  <div class="rv-toolbar__right">
    <span class="rv-toolbar__path" id="markdownPath">{{MARKDOWN_PATH}}</span>
    <button class="rv-btn rv-btn--primary" id="reviewDoneBtn">리뷰 완료</button>
  </div>
</footer>

<!-- Comment input panel (hidden by default) -->
<div class="rv-comment-panel" id="commentPanel" hidden>
  <div class="rv-comment-panel__header">
    <span class="rv-comment-panel__title">코멘트 추가</span>
    <button class="rv-btn rv-btn--icon rv-comment-panel__close" id="commentPanelClose" aria-label="닫기">
      <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
    </button>
  </div>
  <div class="rv-comment-panel__selected" id="commentSelectedText"></div>
  <div class="rv-comment-panel__existing" id="commentExisting"></div>
  <div class="rv-comment-panel__intents">
    <button class="rv-intent-btn" data-intent="fix"><span class="rv-intent-dot rv-intent-dot--fix"></span>수정 요청</button>
    <button class="rv-intent-btn" data-intent="question"><span class="rv-intent-dot rv-intent-dot--question"></span>질문</button>
    <button class="rv-intent-btn" data-intent="expand"><span class="rv-intent-dot rv-intent-dot--expand"></span>확장 요청</button>
    <button class="rv-intent-btn" data-intent="approve"><span class="rv-intent-dot rv-intent-dot--approve"></span>승인</button>
  </div>
  <textarea class="rv-comment-panel__input" id="commentInput" placeholder="코멘트를 입력하세요..." rows="3"></textarea>
  <div class="rv-comment-panel__actions">
    <button class="rv-btn rv-btn--secondary" id="commentCancelBtn">취소</button>
    <button class="rv-btn rv-btn--primary" id="commentSaveBtn">저장</button>
  </div>
</div>

<!-- Toast container -->
<div class="rv-toast-container" id="toastContainer"></div>

<!-- Comment trigger (appears on text selection / section hover) -->
<button class="rv-comment-trigger" id="commentTrigger" hidden aria-label="코멘트 추가">
  <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M18 13V5a2 2 0 00-2-2H4a2 2 0 00-2 2v8a2 2 0 002 2h3l3 3 3-3h3a2 2 0 002-2zM5 7a1 1 0 011-1h8a1 1 0 110 2H6a1 1 0 01-1-1zm1 3a1 1 0 100 2h3a1 1 0 100-2H6z" clip-rule="evenodd"/></svg>
</button>

<script>
// Configuration injected by server
const REPORT_CONFIG = {
  markdownContent: {{MARKDOWN_CONTENT_JSON}},
  markdownPath: "{{MARKDOWN_PATH}}",
  reportTitle: "{{REPORT_TITLE}}",
  serverMode: {{SERVER_MODE}},
};
</script>
<script src="/assets/report.js"></script>
</body>
</html>
